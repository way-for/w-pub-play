<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>墨卷 · 免费小说阅读</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   RESET & ROOT VARIABLES
══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;
  --bg2:#181714;
  --surface:#1e1c18;
  --surface2:#252320;
  --border:#2e2b26;
  --text:#e8dfc8;
  --text2:#a89880;
  --text3:#6b5f50;
  --accent:#c8943a;
  --accent2:#a87830;
  --accent-glow:rgba(200,148,58,.18);
  --r:10px;
  --font-size:18px;
  --line-h:2.0;
  --read-font:'Noto Serif SC',serif;
  --ui-font:'Noto Sans SC',sans-serif;
  --trans:.22s cubic-bezier(.4,0,.2,1);
}
[data-theme="warm"]{
  --bg:#f5f0e8;--bg2:#ede7da;--surface:#fdfaf5;--surface2:#f2ece1;
  --border:#ddd0bc;--text:#2c2416;--text2:#6b5e4e;--text3:#a8967e;
  --accent:#8b4513;--accent2:#6d3410;--accent-glow:rgba(139,69,19,.12);
}
[data-theme="green"]{
  --bg:#0d1a0f;--bg2:#111f13;--surface:#152418;--surface2:#1a2b1d;
  --border:#243527;--text:#c8dfc0;--text2:#7a9e78;--text3:#4a6e48;
  --accent:#4caf50;--accent2:#388e3c;--accent-glow:rgba(76,175,80,.15);
}
[data-theme="gray"]{
  --bg:#f0f0f0;--bg2:#e8e8e8;--surface:#fafafa;--surface2:#f0f0f0;
  --border:#d0d0d0;--text:#202020;--text2:#606060;--text3:#909090;
  --accent:#404040;--accent2:#303030;--accent-glow:rgba(64,64,64,.1);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ui-font);overflow-x:hidden}
body{transition:background var(--trans),color var(--trans)}

/* ══════════════════════════════════════════════
   LAYOUT PAGES
══════════════════════════════════════════════ */
.page{display:none;min-height:100vh;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════════════
   TOP NAV
══════════════════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.nav-logo{
  font-family:'ZCOOL XiaoWei',serif;font-size:22px;color:var(--accent);
  cursor:pointer;letter-spacing:2px;text-decoration:none;flex-shrink:0;
}
.nav-back{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:20px;padding:4px 8px;border-radius:6px;transition:color var(--trans);
  display:flex;align-items:center;gap:6px;
}
.nav-back:hover{color:var(--accent)}
.nav-title{flex:1;font-size:14px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-actions{display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0}
.icon-btn{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:18px;padding:6px;border-radius:8px;transition:all var(--trans);
  display:flex;align-items:center;justify-content:center;width:36px;height:36px;
}
.icon-btn:hover{color:var(--accent);background:var(--accent-glow)}
.read-progress{height:2px;background:var(--border);position:relative}
.read-progress-bar{height:100%;background:var(--accent);transition:width .1s linear;width:0}

/* ══════════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════════ */
#homePage{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px 40px;
}
.hero{text-align:center;margin-bottom:48px}
.hero h1{
  font-family:'ZCOOL XiaoWei',serif;font-size:clamp(32px,6vw,56px);
  color:var(--text);line-height:1.2;margin-bottom:14px;letter-spacing:4px;
}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--text2);font-size:15px;letter-spacing:1px}

.search-box{
  width:100%;max-width:640px;position:relative;margin-bottom:16px;
}
.search-input{
  width:100%;padding:16px 60px 16px 22px;
  font-size:17px;font-family:var(--ui-font);
  background:var(--surface);border:1px solid var(--border);
  border-radius:50px;color:var(--text);outline:none;
  transition:border-color var(--trans),box-shadow var(--trans);
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-input::placeholder{color:var(--text3)}
.search-btn{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:var(--accent);border:none;color:#fff;
  width:44px;height:44px;border-radius:50%;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background var(--trans),transform .15s;
}
.search-btn:hover{background:var(--accent2);transform:translateY(-50%) scale(1.06)}
.search-hint{color:var(--text3);font-size:13px;text-align:center}

/* 搜索结果 */
.results-area{width:100%;max-width:740px;margin-top:20px}
.results-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4px 12px;color:var(--text2);font-size:14px;
}
.result-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;margin-bottom:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);cursor:pointer;
  transition:all var(--trans);text-decoration:none;color:inherit;
}
.result-card:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(4px)}
.result-thumb{
  width:46px;height:62px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:600;text-align:center;line-height:1.3;padding:4px;
  overflow:hidden;
}
.result-thumb img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.result-info{flex:1;min-width:0}
.result-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-meta{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-arrow{color:var(--text3);font-size:16px;flex-shrink:0}

/* ══════════════════════════════════════════════
   BOOK DETAIL PAGE
══════════════════════════════════════════════ */
#bookPage{padding-bottom:40px}
.book-hero{
  display:flex;gap:20px;padding:24px 20px;
  background:linear-gradient(var(--surface),var(--bg));
}
.book-cover{
  width:100px;height:136px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;font-weight:600;text-align:center;
  overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-meta h1{font-size:20px;color:var(--text);margin-bottom:8px;font-family:'ZCOOL XiaoWei',serif;letter-spacing:1px}
.book-meta p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px;max-height:72px;overflow:hidden}
.book-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;
  font-family:var(--ui-font);font-weight:500;transition:all var(--trans);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.btn-sm{padding:6px 14px;font-size:13px}

.section-title{
  font-size:14px;font-weight:500;color:var(--text2);letter-spacing:1px;
  padding:16px 20px 10px;border-bottom:1px solid var(--border);margin-bottom:0;
  display:flex;align-items:center;justify-content:space-between;
}
.chapter-list{padding:8px 12px}
.chapter-item{
  padding:11px 8px;border-bottom:1px solid var(--border);cursor:pointer;
  color:var(--text2);font-size:14px;transition:color var(--trans);
  display:flex;align-items:center;justify-content:space-between;
  border-radius:6px;
}
.chapter-item:hover{color:var(--accent);background:var(--accent-glow);padding-left:14px}
.chapter-item.read{color:var(--text3)}

/* 折叠章节 */
.chapter-more{
  text-align:center;padding:14px;color:var(--accent);font-size:14px;
  cursor:pointer;border-top:1px solid var(--border);
}
.chapter-more:hover{background:var(--accent-glow)}

/* 下载面板 */
.dl-panel{
  margin:12px 20px;padding:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  display:none;
}
.dl-panel.show{display:block}
.dl-progress{
  margin-top:12px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;
}
.dl-bar{height:100%;background:var(--accent);width:0;transition:width .3s;border-radius:3px}
.dl-status{font-size:13px;color:var(--text2);margin-top:8px}

/* ══════════════════════════════════════════════
   READER PAGE
══════════════════════════════════════════════ */
#readerPage{
  --reader-max:680px;
}
.reader-body{
  max-width:var(--reader-max);margin:0 auto;
  padding:32px 24px 80px;
}
.reader-chapter-title{
  font-family:'ZCOOL XiaoWei',serif;font-size:22px;color:var(--text);
  margin-bottom:28px;letter-spacing:2px;line-height:1.5;
  padding-bottom:16px;border-bottom:1px solid var(--border);
}
.reader-content{
  font-family:var(--read-font);
  font-size:var(--font-size);
  line-height:var(--line-h);
  color:var(--text);
  letter-spacing:0.05em;
}
.reader-content p{
  text-indent:2em;margin-bottom:0.5em;
}
.reader-nav{
  display:flex;gap:12px;padding:20px 24px;
  max-width:var(--reader-max);margin:0 auto;
  border-top:1px solid var(--border);
}
.reader-nav .btn{flex:1;justify-content:center}

/* ══════════════════════════════════════════════
   SETTINGS DRAWER
══════════════════════════════════════════════ */
.drawer-mask{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:none;opacity:0;transition:opacity var(--trans);
}
.drawer-mask.show{display:flex;align-items:flex-end;justify-content:center}
.drawer-mask.visible{opacity:1}
.drawer{
  width:100%;max-width:500px;background:var(--surface);
  border-radius:20px 20px 0 0;padding:24px 24px 32px;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.drawer-mask.visible .drawer{transform:translateY(0)}
.drawer-handle{
  width:40px;height:4px;background:var(--border);
  border-radius:2px;margin:0 auto 24px;
}
.drawer h3{font-size:15px;color:var(--text2);margin-bottom:18px;font-weight:400;letter-spacing:1px}
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.setting-label{font-size:14px;color:var(--text)}
.theme-swatches{display:flex;gap:10px}
.swatch{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:border-color var(--trans),transform .15s;
}
.swatch:hover,.swatch.active{border-color:var(--accent);transform:scale(1.15)}
.swatch-dark{background:#0f0e0c;box-shadow:0 0 0 1px #444}
.swatch-warm{background:#f5f0e8;box-shadow:0 0 0 1px #c8b89a}
.swatch-green{background:#0d1a0f;box-shadow:0 0 0 1px #4caf50}
.swatch-gray{background:#f0f0f0;box-shadow:0 0 0 1px #999}
.font-size-ctrl{display:flex;align-items:center;gap:12px}
.font-size-ctrl button{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all var(--trans);
}
.font-size-ctrl button:hover{border-color:var(--accent);color:var(--accent)}
.font-size-ctrl span{min-width:40px;text-align:center;font-size:15px;color:var(--text)}
.line-slider{
  -webkit-appearance:none;appearance:none;width:140px;height:4px;
  background:var(--border);border-radius:2px;outline:none;cursor:pointer;
}
.line-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--accent);cursor:pointer;
}

/* ══════════════════════════════════════════════
   AUTH MODAL
══════════════════════════════════════════════ */
.modal-mask{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-mask.show{display:flex}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:32px;width:100%;max-width:360px;
}
.modal-box h2{font-family:'ZCOOL XiaoWei',serif;font-size:22px;color:var(--text);margin-bottom:24px;letter-spacing:2px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.field input{
  width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;font-family:var(--ui-font);outline:none;
  transition:border-color var(--trans);
}
.field input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns .btn{flex:1;justify-content:center}
.auth-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--text3)}
.auth-switch a{color:var(--accent);cursor:pointer}

/* ══════════════════════════════════════════════
   ACCOUNT PAGE
══════════════════════════════════════════════ */
#accountPage{padding:24px 20px}
.account-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:24px;margin-bottom:16px;
}
.account-card h3{font-size:15px;color:var(--text);margin-bottom:16px;font-weight:500}
.history-item{
  padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;
  transition:color var(--trans);
}
.history-item:last-child{border-bottom:none}
.history-item:hover{color:var(--accent)}
.history-title{font-size:14px;color:var(--text)}
.history-meta{font-size:12px;color:var(--text3);margin-top:3px}

/* ══════════════════════════════════════════════
   UTIL
══════════════════════════════════════════════ */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:16px}
.loading{text-align:center;padding:40px;color:var(--text3)}
.loading::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:10px 22px;border-radius:50px;
  font-size:14px;z-index:500;opacity:0;pointer-events:none;
  transition:all .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ══ HOME PAGE ══ -->
<div id="homePage" class="page active">
  <nav class="nav">
    <a class="nav-logo" onclick="goHome()">墨卷</a>
    <div class="nav-actions">
      <button class="icon-btn" onclick="showSettings()" title="阅读设置">⚙️</button>
      <button class="icon-btn" id="accountBtn" onclick="goAccount()" title="账号">👤</button>
    </div>
  </nav>
  <div style="padding:0 20px">
    <div class="hero" style="padding-top:50px">
      <h1>万卷藏书，<span>一键畅读</span></h1>
      <p>搜索全网小说 · 免费阅读 · 记录书架</p>
    </div>
    <div style="display:flex;justify-content:center">
      <div class="search-box">
        <input class="search-input" id="searchInput" placeholder="输入书名或作者...">
        <button class="search-btn" onclick="doSearch()">🔍</button>
      </div>
    </div>
    <p class="search-hint">内容来源于互联网，仅供个人学习使用</p>
    <div class="results-area" id="resultsArea" style="margin:20px auto 0">
      <div id="homeArea" style="text-align:center;padding:40px 0">
        <div style="font-size:48px;margin-bottom:16px">📚</div>
        <p style="color:var(--text3);font-size:14px">搜索你喜欢的小说</p>
      </div>
      <div id="resultsList" style="display:none">
        <div class="results-header">
          <span id="resCount"></span>
          <span style="color:var(--text3);font-size:12px">搜索结果来自互联网</span>
        </div>
        <div id="resItems"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ BOOK PAGE ══ -->
<div id="bookPage" class="page">
  <nav class="nav">
    <button class="nav-back" onclick="goHome()">←</button>
    <span class="nav-title" id="bookNavTitle">书籍详情</span>
    <div class="nav-actions">
      <button class="icon-btn" id="shelfBtn" onclick="toggleShelf()" title="书架">🔖</button>
    </div>
  </nav>
  <div class="book-hero">
    <div class="book-cover" id="bookCover">封面</div>
    <div class="book-meta">
      <h1 id="bookTitle">—</h1>
      <p id="bookIntro"></p>
      <div class="book-actions">
        <button class="btn btn-primary" onclick="startRead()">▶ 开始阅读</button>
        <button class="btn btn-outline btn-sm" onclick="toggleDl()">⬇ 下载</button>
      </div>
    </div>
  </div>
  <div class="dl-panel" id="dlPanel">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:14px;color:var(--text)">下载全本为 TXT</span>
      <button class="btn btn-primary btn-sm" id="dlBtn" onclick="downloadBook()">开始下载</button>
    </div>
    <div class="dl-progress"><div class="dl-bar" id="dlBar"></div></div>
    <div class="dl-status" id="dlStatus"></div>
  </div>
  <div class="section-title">
    <span>目录</span>
    <span id="chapCount" style="font-size:12px;color:var(--text3)"></span>
  </div>
  <div class="chapter-list" id="chapterList"><div class="loading">加载中</div></div>
  <div class="chapter-more" id="chapterMore" style="display:none" onclick="showAllChapters()">展开全部章节 ▼</div>
</div>

<!-- ══ READER PAGE ══ -->
<div id="readerPage" class="page">
  <nav class="nav">
    <button class="nav-back" onclick="goBack()">←</button>
    <span class="nav-title" id="readerNavTitle"></span>
    <div class="nav-actions">
      <button class="icon-btn" onclick="showSettings()">⚙️</button>
    </div>
  </nav>
  <div class="read-progress"><div class="read-progress-bar" id="progressBar"></div></div>
  <div class="reader-body">
    <h2 class="reader-chapter-title" id="readerTitle"></h2>
    <div class="reader-content" id="readerContent"><div class="loading">加载中</div></div>
  </div>
  <div class="reader-nav">
    <button class="btn btn-outline" id="prevBtn" onclick="loadPrev()">← 上一章</button>
    <button class="btn btn-outline" id="nextBtn" onclick="loadNext()">下一章 →</button>
  </div>
</div>

<!-- ══ ACCOUNT PAGE ══ -->
<div id="accountPage" class="page">
  <nav class="nav">
    <button class="nav-back" onclick="goHome()">←</button>
    <span class="nav-title">我的账号</span>
  </nav>
  <div id="accountContent"></div>
</div>

<!-- ══ SETTINGS DRAWER ══ -->
<div class="drawer-mask" id="drawerMask" onclick="if(event.target===this)hideSettings()">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <h3>阅读设置</h3>
    <div class="setting-row">
      <span class="setting-label">主题</span>
      <div class="theme-swatches">

<!-- ══════════════════════════════════════════════
   JAVASCRIPT
══════════════════════════════════════════════ -->
<script>
/* ══ CONFIG - 部署前必须修改这两项 ══ */
const CFG = {
  worker: 'https://novel-read.sir-way105.workers.dev',
  sbUrl:  'https://kuztkvkhubvstbcdoerh.supabase.co',
  sbKey:  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1enRrdmtodWJ2c3RiY2RvZXJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzg3MzAsImV4cCI6MjA5Mzc1NDczMH0.-JhbCP0SOm-FzP4YeI9Df-ubTTELBfIsviFWlmNt6f4',
}

/* ══ SETTINGS ══ */
const DEF = { theme:'', fontSize:18, lineH:2.0, font:'serif' }
let S = { ...DEF, ...JSON.parse(localStorage.getItem('mj_cfg')||'{}') }

function applySettings() {
  document.documentElement.setAttribute('data-theme', S.theme)
  document.documentElement.style.setProperty('--font-size', S.fontSize+'px')
  document.documentElement.style.setProperty('--line-h', S.lineH)
  document.documentElement.style.setProperty('--read-font',
    S.font==='sans' ? "'Noto Sans SC',sans-serif" : "'Noto Serif SC',serif")
  document.getElementById('fontSizeLabel').textContent = S.fontSize
  document.getElementById('lineSlider').value = S.lineH
}
function saveSettings() {
  localStorage.setItem('mj_cfg', JSON.stringify(S))
  applySettings()
}
function setTheme(t){ S.theme=t; saveSettings(); document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active')); }
function changeFontSize(d){ S.fontSize=Math.max(14,Math.min(28,S.fontSize+d)); saveSettings() }
function changeLineH(v){ S.lineH=parseFloat(v); saveSettings() }
function setFont(f){ S.font=f; saveSettings() }
function showSettings(){
  const m=document.getElementById('drawerMask')
  m.classList.add('show')
  requestAnimationFrame(()=>m.classList.add('visible'))
}
function hideSettings(){
  const m=document.getElementById('drawerMask')
  m.classList.remove('visible')
  setTimeout(()=>m.classList.remove('show'),350)
}

/* ══ SUPABASE ══ */
let _sb = null, _user = null
try {
  _sb = supabase.createClient(CFG.sbUrl, CFG.sbKey)
  _sb.auth.onAuthStateChange((e,s)=>{ _user=s?.user||null; updateAccountBtn() })
  _sb.auth.getSession().then(({data:{session}})=>{ _user=session?.user||null; updateAccountBtn() })
} catch(e){}

function updateAccountBtn(){
  const b=document.getElementById('accountBtn')
  if(b) b.textContent=_user?'🟢':'👤'
}

/* ══ AUTH ══ */
let _authMode='login'
function goAccount(){
  if(_user) showPage('accountPage', renderAccount)
  else openAuth()
}
function openAuth(){ document.getElementById('authModal').classList.add('show') }
function closeAuth(){ document.getElementById('authModal').classList.remove('show') }
function toggleAuthMode(){
  _authMode=_authMode==='login'?'register':'login'
  document.getElementById('authTitle').textContent=_authMode==='login'?'登录账号':'注册账号'
  document.getElementById('authSubmit').textContent=_authMode==='login'?'登录':'注册'
  document.querySelector('.auth-switch').innerHTML=
    _authMode==='login'?'还没有账号？<a onclick="toggleAuthMode()">注册</a>':'已有账号？<a onclick="toggleAuthMode()">登录</a>'
}
async function submitAuth(){
  if(!_sb){toast('请先配置 Supabase');return}
  const email=document.getElementById('authEmail').value
  const pwd=document.getElementById('authPwd').value
  if(!email||!pwd){toast('请填写邮箱和密码');return}
  try{
    let err
    if(_authMode==='login'){
      ({error:err}=await _sb.auth.signInWithPassword({email,password:pwd}))
    }else{
      ({error:err}=await _sb.auth.signUp({email,password:pwd}))
    }
    if(err)throw err
    closeAuth()
    toast(_authMode==='login'?'登录成功':'注册成功，请查收验证邮件')
    if(_authMode==='login') setTimeout(()=>goAccount(),500)
  }catch(e){toast(e.message||'操作失败')}
}

function renderAccount(){
  const el=document.getElementById('accountContent')
  if(!_user){el.innerHTML='<div class="empty"><div class="icon">👤</div><p>请先登录</p></div>';return}
  const hist=getHistory()
  el.innerHTML=`
    <div style="padding:20px">
      <div class="account-card">
        <h3>账号信息</h3>
        <p style="font-size:14px;color:var(--text2)">📧 ${_user.email}</p>
        <button class="btn btn-outline btn-sm" style="margin-top:14px" onclick="signOut()">退出登录</button>
      </div>
      <div class="account-card">
        <h3>阅读历史</h3>
        ${hist.length?hist.map(h=>`
          <div class="history-item" onclick="openBook('${h.url}','${encodeURIComponent(h.title)}')">
            <div class="history-title">${h.title}</div>
            <div class="history-meta">${h.chapter||''}  ${h.time||''}</div>
          </div>`).join(''):'<p style="color:var(--text3);font-size:14px">暂无记录</p>'}
      </div>
    </div>`
}
async function signOut(){
  if(_sb)await _sb.auth.signOut()
  toast('已退出登录')
  goHome()
}

/* ══ LOCAL STORAGE ══ */
function getHistory(){ return JSON.parse(localStorage.getItem('mj_hist')||'[]') }
function addHistory(url,title,chapter=''){
  let h=getHistory().filter(x=>x.url!==url)
  h.unshift({url,title,chapter,time:new Date().toLocaleDateString()})
  if(h.length>50)h=h.slice(0,50)
  localStorage.setItem('mj_hist',JSON.stringify(h))
}
function getShelf(){ return JSON.parse(localStorage.getItem('mj_shelf')||'[]') }
function onShelf(url){ return getShelf().some(x=>x.url===url) }
function toggleShelfItem(url,title){
  let s=getShelf()
  if(onShelf(url)){ s=s.filter(x=>x.url!==url); toast('已移出书架') }
  else { s.unshift({url,title}); toast('已加入书架') }
  localStorage.setItem('mj_shelf',JSON.stringify(s))
  updateShelfBtn()
}

/* ══ PAGES ══ */
let _prevPage='homePage'
function showPage(id, cb){
  const pages=document.querySelectorAll('.page')
  pages.forEach(p=>{ if(p.id!==id) _prevPage=p.classList.contains('active')?p.id:_prevPage; p.classList.remove('active') })
  document.getElementById(id).classList.add('active')
  window.scrollTo(0,0)
  if(cb)cb()
}
function goHome(){
  document.getElementById('homeArea').style.display='block'
  document.getElementById('resultsList').style.display='none'
  showPage('homePage')
}
function goBack(){
  showPage(_prevPage==='readerPage'?'bookPage':_prevPage,
    _prevPage==='bookPage'?null:null)
}
function goAccount(){ showPage('accountPage',renderAccount) }

/* ══ API ══ */
async function api(action, param){
  const url=new URL(CFG.worker)
  url.searchParams.set('a',action)
  url.searchParams.set('p',param)
  const res=await fetch(url.toString())
  if(!res.ok)throw new Error('HTTP '+res.status)
  const data=await res.json()
  if(data.error)throw new Error(data.error)
  return data
}

/* ══ SEARCH ══ */
let _searching=false
async function doSearch(){
  if(_searching){toast('搜索中，请稍候…');return}
  const q=document.getElementById('searchInput').value.trim()
  if(!q){toast('请输入搜索内容');return}
  _searching=true
  document.getElementById('homeArea').style.display='none'
  document.getElementById('resultsList').style.display='block'
  document.getElementById('resItems').innerHTML='<div class="loading">搜索中</div>'
  document.getElementById('resCount').textContent=''
  try{
    const data=await api('search',q)
    const items=data.results||[]
    document.getElementById('resCount').textContent=`共 ${items.length} 条`
    if(!items.length){
      document.getElementById('resItems').innerHTML='<div class="empty"><div class="icon">🔍</div><p>未找到结果，换个关键词试试</p></div>'
      return
    }
    document.getElementById('resItems').innerHTML=items.map((r,i)=>{
      const initials=r.title.slice(0,3)
      return `<div class="result-card" onclick="openBook('${encodeURIComponent(r.url)}','${encodeURIComponent(r.title)}')">
        <div class="result-thumb">${initials}</div>
        <div class="result-info">
          <div class="result-title">${r.title}</div>
          <div class="result-meta">🔗 ${new URL(r.url).hostname}</div>
        </div>
        <span class="result-arrow">›</span>
      </div>`
    }).join('')
  }catch(e){
    document.getElementById('resItems').innerHTML=`<div class="empty"><div class="icon">⚠️</div><p>搜索失败：${e.message}</p></div>`
  } finally {
    _searching=false
  }
}

/* ══ BOOK ══ */
let _bookUrl='', _bookTitle='', _chapters=[], _showAll=false

function openBook(encUrl, encTitle){
  _bookUrl=decodeURIComponent(encUrl)
  _bookTitle=decodeURIComponent(encTitle)
  _chapters=[]
  _showAll=false
  document.getElementById('bookNavTitle').textContent=_bookTitle
  document.getElementById('bookTitle').textContent=_bookTitle
  document.getElementById('bookIntro').textContent='加载中...'
  document.getElementById('bookCover').innerHTML=_bookTitle.slice(0,4)
  document.getElementById('chapterList').innerHTML='<div class="loading">加载目录</div>'
  document.getElementById('chapterMore').style.display='none'
  document.getElementById('dlPanel').classList.remove('show')
  updateShelfBtn()
  showPage('bookPage')
  loadBook()
}

async function loadBook(){
  try{
    const data=await api('book',_bookUrl)
    if(data.cover){
      document.getElementById('bookCover').innerHTML=`<img src="${data.cover}" onerror="this.parentNode.textContent='${_bookTitle.slice(0,4)}'}">`
    }
    document.getElementById('bookTitle').textContent=data.title||_bookTitle
    _bookTitle=data.title||_bookTitle
    document.getElementById('bookIntro').textContent=data.intro||'暂无简介'
    _chapters=data.chapters||[]
    document.getElementById('chapCount').textContent=_chapters.length+'章'
    if(_chapters.length===0){
      document.getElementById('chapterList').innerHTML=`
        <div class="empty">
          <div class="icon">🔒</div>
          <p style="margin-bottom:8px">该网站暂不支持自动解析</p>
          <p style="font-size:12px;color:var(--text3);margin-bottom:16px">可能是付费平台或有反爬保护</p>
          <a href="${_bookUrl}" target="_blank" class="btn btn-outline" style="display:inline-flex">在原网站阅读 ↗</a>
        </div>`
    } else {
      renderChapters()
    }
  }catch(e){
    document.getElementById('bookIntro').textContent='目录加载失败'
    document.getElementById('chapterList').innerHTML=`
      <div class="empty">
        <div class="icon">⚠️</div>
        <p style="margin-bottom:16px">无法自动解析该网站</p>
        <a href="${_bookUrl}" target="_blank" class="btn btn-outline" style="display:inline-flex">在原网站打开 ↗</a>
      </div>`
  }
}

function renderChapters(){
  const limit=_showAll?_chapters.length:80
  const show=_chapters.slice(0,limit)
  document.getElementById('chapterList').innerHTML=show.map((c,i)=>`
    <div class="chapter-item" onclick="openChapter(${i})">
      <span>${c.title}</span>
      <span style="color:var(--text3);font-size:12px">›</span>
    </div>`).join('')
  if(!_showAll && _chapters.length>80){
    document.getElementById('chapterMore').style.display='block'
    document.getElementById('chapterMore').textContent=`展开全部 ${_chapters.length} 章 ▼`
  }else{
    document.getElementById('chapterMore').style.display='none'
  }
}

function showAllChapters(){ _showAll=true; renderChapters() }

function updateShelfBtn(){
  const b=document.getElementById('shelfBtn')
  if(b) b.textContent=onShelf(_bookUrl)?'⭐':'🔖'
}
function toggleShelf(){ toggleShelfItem(_bookUrl,_bookTitle); }

function startRead(){
  if(!_chapters.length){
    // 尝试直接跳到第一章
    toast('目录未加载，请稍候')
    return
  }
  // 找上次进度
  const hist=getHistory().find(h=>h.url===_bookUrl)
  const idx=hist?(_chapters.findIndex(c=>c.url===hist.chapterUrl)||0):0
  openChapter(idx>=0?idx:0)
}

/* ══ READER ══ */
let _curChIdx=0, _curChUrl='', _prevUrl=null, _nextUrl=null

function openChapter(idx){
  _curChIdx=idx
  const ch=_chapters[idx]
  if(!ch){toast('章节不存在');return}
  _curChUrl=ch.url
  loadChapter(ch.url, ch.title)
  showPage('readerPage')
}

async function loadChapter(url, hint){
  document.getElementById('readerTitle').textContent=hint||'加载中...'
  document.getElementById('readerContent').innerHTML='<div class="loading">加载正文</div>'
  document.getElementById('readerNavTitle').textContent=hint||''
  document.getElementById('progressBar').style.width='0'
  _prevUrl=null; _nextUrl=null
  updateNavBtns()
  window.scrollTo(0,0)

  try{
    const data=await api('chapter',url)
    document.getElementById('readerTitle').textContent=data.title||hint||'未知章节'
    document.getElementById('readerNavTitle').textContent=data.title||hint||''
    // 渲染正文
    const paras=data.content.split('\n').filter(p=>p.trim())
    document.getElementById('readerContent').innerHTML=paras.map(p=>`<p>${escHtml(p.trim())}</p>`).join('')
    _prevUrl=data.prevUrl; _nextUrl=data.nextUrl
    // 如果 API 没返回 prev/next，用本地章节列表推算
    if(!_prevUrl && _curChIdx>0) _prevUrl='__local__'
    if(!_nextUrl && _curChIdx<_chapters.length-1) _nextUrl='__local__'
    updateNavBtns()
    // 记录进度
    addHistory(_bookUrl, _bookTitle, data.title)
    // 滚动进度条
    setupScrollProgress()
  }catch(e){
    document.getElementById('readerContent').innerHTML=`
      <div class="empty">
        <div class="icon">⚠️</div>
        <p style="margin-bottom:16px">章节加载失败：${e.message}</p>
        <a href="${url}" target="_blank" class="btn btn-outline" style="display:inline-flex">在原网站阅读 ↗</a>
      </div>`
  }
}

function updateNavBtns(){
  document.getElementById('prevBtn').disabled=!_prevUrl&&_curChIdx<=0
  document.getElementById('nextBtn').disabled=!_nextUrl&&_curChIdx>=_chapters.length-1
}
function loadPrev(){
  if(_prevUrl==='__local__'){ openChapter(_curChIdx-1); return }
  if(_prevUrl){ _curChIdx=Math.max(0,_curChIdx-1); loadChapter(_prevUrl,'上一章') }
  else if(_curChIdx>0) openChapter(_curChIdx-1)
}
function loadNext(){
  if(_nextUrl==='__local__'){ openChapter(_curChIdx+1); return }
  if(_nextUrl){ _curChIdx=Math.min(_chapters.length-1,_curChIdx+1); loadChapter(_nextUrl,'下一章') }
  else if(_curChIdx<_chapters.length-1) openChapter(_curChIdx+1)
}

// 键盘快捷键
document.addEventListener('keydown',e=>{
  if(document.getElementById('readerPage').classList.contains('active')){
    if(e.key==='ArrowLeft')loadPrev()
    if(e.key==='ArrowRight')loadNext()
  }
})

function setupScrollProgress(){
  const bar=document.getElementById('progressBar')
  const handler=()=>{
    const total=document.body.scrollHeight-window.innerHeight
    const pct=total>0?Math.round(window.scrollY/total*100):0
    bar.style.width=pct+'%'
  }
  window.removeEventListener('scroll',window._scrollProg)
  window._scrollProg=handler
  window.addEventListener('scroll',handler,{passive:true})
}

/* ══ DOWNLOAD ══ */
function toggleDl(){
  const p=document.getElementById('dlPanel')
  p.classList.toggle('show')
}

async function downloadBook(){
  if(!_chapters.length){toast('请先加载目录');return}
  const btn=document.getElementById('dlBtn')
  const bar=document.getElementById('dlBar')
  const status=document.getElementById('dlStatus')
  btn.disabled=true; btn.textContent='下载中...'
  bar.style.width='0'

  let txt=`《${_bookTitle}》\n${'='.repeat(40)}\n\n`
  const total=_chapters.length
  let failed=0

  for(let i=0;i<total;i++){
    const ch=_chapters[i]
    status.textContent=`正在下载 ${i+1}/${total}：${ch.title}`
    bar.style.width=(i/total*100)+'%'
    try{
      const data=await api('chapter',ch.url)
      txt+=`\n\n${data.title||ch.title}\n${'─'.repeat(30)}\n\n${data.content}\n`
    }catch(e){
      txt+=`\n\n${ch.title}\n${'─'.repeat(30)}\n\n（章节加载失败）\n`
      failed++
    }
    // 限速防封
    await new Promise(r=>setTimeout(r,600))
  }

  bar.style.width='100%'
  status.textContent=`下载完成！共 ${total} 章${failed?`（${failed} 章失败）`:''}`
  btn.disabled=false; btn.textContent='重新下载'

  // 触发下载
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'})
  const a=document.createElement('a')
  a.href=URL.createObjectURL(blob)
  a.download=`${_bookTitle}.txt`
  a.click()
  URL.revokeObjectURL(a.href)
}

/* ══ UTILS ══ */
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

let _toastT
function toast(msg,ms=2400){
  const el=document.getElementById('toast')
  el.textContent=msg; el.classList.add('show')
  clearTimeout(_toastT)
  _toastT=setTimeout(()=>el.classList.remove('show'),ms)
}

/* ══ INIT ══ */
applySettings()
document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); doSearch() } })
</script>
