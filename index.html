<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>墨卷 · 免费小说阅读</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--bg2:#181714;--surface:#1e1c18;--surface2:#252320;
  --border:#2e2b26;--text:#e8dfc8;--text2:#a89880;--text3:#6b5f50;
  --accent:#c8943a;--accent2:#a87830;--glow:rgba(200,148,58,.14);
  --r:8px;--fs:18px;--lh:2.0;--rfont:'Noto Serif SC',serif;--ufont:'Noto Sans SC',sans-serif;
  --sw:260px;--trans:.2s ease;
}
[data-theme=warm]{--bg:#f5f0e8;--bg2:#ede7da;--surface:#fdfaf5;--surface2:#f2ece1;--border:#ddd0bc;--text:#2c2416;--text2:#6b5e4e;--text3:#a8967e;--accent:#8b4513;--accent2:#6d3410;--glow:rgba(139,69,19,.09)}
[data-theme=green]{--bg:#0d1a0f;--bg2:#111f13;--surface:#152418;--surface2:#1a2b1d;--border:#243527;--text:#c8dfc0;--text2:#7a9e78;--text3:#4a6e48;--accent:#4caf50;--accent2:#388e3c;--glow:rgba(76,175,80,.11)}
[data-theme=gray]{--bg:#f2f2f2;--bg2:#e8e8e8;--surface:#fafafa;--surface2:#efefef;--border:#d0d0d0;--text:#1a1a1a;--text2:#555;--text3:#999;--accent:#333;--accent2:#111;--glow:rgba(0,0,0,.05)}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ufont)}
.page{display:none}
.page.active{display:block}

/* ── HOME ── */
#homePage{min-height:100vh}
.hnav{display:flex;align-items:center;gap:10px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50}
.logo{font-family:'ZCOOL XiaoWei',serif;font-size:22px;color:var(--accent);letter-spacing:3px;cursor:pointer}
.hnav .sp{flex:1}
.ibtn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:17px;padding:6px 10px;border-radius:6px;transition:color var(--trans)}
.ibtn:hover{color:var(--accent)}
.hbody{display:flex;flex-direction:column;align-items:center;padding:60px 20px 40px}
.hero{text-align:center;margin-bottom:36px}
.hero h1{font-family:'ZCOOL XiaoWei',serif;font-size:clamp(26px,5vw,50px);letter-spacing:5px;margin-bottom:10px}
.hero h1 em{color:var(--accent);font-style:normal}
.hero p{color:var(--text3);font-size:13px;letter-spacing:1px}
.srow{display:flex;width:100%;max-width:600px;border:1px solid var(--border);border-radius:50px;overflow:hidden;background:var(--surface);transition:border-color var(--trans),box-shadow var(--trans)}
.srow:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.sinput{flex:1;padding:14px 20px;font-size:16px;background:none;border:none;outline:none;color:var(--text);font-family:var(--ufont)}
.sinput::placeholder{color:var(--text3)}
.sbtn{padding:12px 26px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-size:14px;font-family:var(--ufont);font-weight:500;white-space:nowrap;transition:background var(--trans)}
.sbtn:hover{background:var(--accent2)}
.shint{color:var(--text3);font-size:12px;text-align:center;margin-top:10px}
.rwrap{width:100%;max-width:720px;margin-top:16px}
.rhdr{display:flex;justify-content:space-between;color:var(--text3);font-size:12px;padding:0 2px 10px}
.rcard{display:flex;align-items:center;gap:14px;padding:13px 16px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all var(--trans)}
.rcard:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(3px)}
.rthumb{width:44px;height:58px;border-radius:6px;flex-shrink:0;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;text-align:center;line-height:1.3;padding:4px}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:14px;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rmeta{font-size:12px;color:var(--text3)}
.rarrow{color:var(--text3);font-size:18px;flex-shrink:0}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty .ei{font-size:44px;margin-bottom:12px}
.ltxt{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* ── READER ── */
#readerPage{min-height:100vh;display:none;flex-direction:column}
#readerPage.active{display:flex}
.rtopbar{display:flex;align-items:center;gap:8px;padding:0 16px;height:48px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.rtopbar .logo{font-size:17px;letter-spacing:2px}
.tbsep{color:var(--border);font-size:12px}
.tbbook{font-size:12px;color:var(--text2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbch{font-size:12px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tbacts{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:5px;font-size:12px;font-family:var(--ufont);transition:all var(--trans);white-space:nowrap}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn:disabled{opacity:.3;cursor:default;pointer-events:none}
.rprog{height:2px;background:var(--border);flex-shrink:0}
.rprogfill{height:100%;background:var(--accent);width:0;transition:width .1s linear}
.rmain{display:flex;flex:1;min-height:0;overflow:hidden}

/* sidebar */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:calc(100vh - 50px);position:sticky;top:50px;overflow:hidden;transition:width var(--trans)}
.sidebar.hidden{width:0;min-width:0;overflow:hidden}
.sbhead{padding:12px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sbttl{font-size:13px;color:var(--text);font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbcnt{font-size:11px;color:var(--text3)}
.sbacts{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sabtn{flex:1;padding:6px 4px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--ufont);transition:all var(--trans);text-align:center;white-space:nowrap}
.sabtn:hover{border-color:var(--accent);color:var(--accent)}
.clist{flex:1;overflow-y:auto;padding:4px 0}
.clist::-webkit-scrollbar{width:3px}
.clist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.citem{padding:8px 14px;cursor:pointer;font-size:12px;color:var(--text2);border-left:2px solid transparent;transition:all .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.citem:hover{color:var(--text);background:var(--surface);border-left-color:var(--accent)}
.citem.on{color:var(--accent);border-left-color:var(--accent);background:var(--glow)}
.cmore{padding:10px;text-align:center;color:var(--accent);font-size:12px;cursor:pointer;border-top:1px solid var(--border)}
.cmore:hover{background:var(--glow)}
.dlsec{border-top:1px solid var(--border);padding:10px;flex-shrink:0}
.dlmain{width:100%;padding:8px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--ufont);transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:5px}
.dlmain:hover{border-color:var(--accent);color:var(--accent);background:var(--glow)}
.dlpw{margin-top:6px;display:none}
.dlbb{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.dlbf{height:100%;background:var(--accent);width:0;transition:width .3s}
.dlst{font-size:11px;color:var(--text3);margin-top:4px;text-align:center}

/* mobile sidebar overlay */
.sbmask{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none}
.sbmask.on{display:block}
@media(max-width:720px){
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:201;transform:translateX(-100%);width:260px;transition:transform var(--trans)}
  .sidebar.mob-open{transform:translateX(0)}
  .sidebar.hidden{transform:translateX(-100%);width:260px}
  .tbbook,.tbsep:first-of-type{display:none}
}

/* content */
.cwrap{flex:1;overflow-y:auto;padding:36px clamp(16px,5vw,80px) 80px;min-width:0}
.cwrap::-webkit-scrollbar{width:5px}
.cwrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.chtitle{font-family:'ZCOOL XiaoWei',serif;font-size:clamp(17px,2.5vw,24px);color:var(--text);letter-spacing:2px;line-height:1.6;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.chbody{font-family:var(--rfont);font-size:var(--fs);line-height:var(--lh);color:var(--text);letter-spacing:.04em;max-width:700px}
.chbody p{text-indent:2em;margin-bottom:.35em}
.chnav{display:flex;gap:10px;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);max-width:700px}
.chnav .tbtn{flex:1;text-align:center;padding:10px}

/* settings drawer */
.dmask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:flex-end;justify-content:center}
.dmask.on{display:flex}
.drawer{width:100%;max-width:460px;background:var(--surface);border-radius:18px 18px 0 0;padding:20px 22px 30px;animation:sup .28s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.dhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.dh3{font-size:13px;color:var(--text2);margin-bottom:14px;letter-spacing:1px}
.drow{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dlabel{font-size:13px;color:var(--text)}
.tdots{display:flex;gap:10px}
.tdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.tdot:hover,.tdot.on{border-color:var(--accent);transform:scale(1.15)}
.tdot.dk{background:#0f0e0c;outline:1px solid #444}
.tdot.wm{background:#f5f0e8;outline:1px solid #c8b89a}
.tdot.gn{background:#0d1a0f;outline:1px solid #4caf50}
.tdot.gy{background:#f2f2f2;outline:1px solid #999}
.fsctl{display:flex;align-items:center;gap:10px}
.fsbtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all var(--trans)}
.fsbtn:hover{border-color:var(--accent);color:var(--accent)}
.fsv{min-width:34px;text-align:center;font-size:13px;color:var(--text)}
.lhsl{-webkit-appearance:none;width:120px;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.lhsl::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer}
.fbtns{display:flex;gap:8px}
.fbtn{padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--ufont);transition:all var(--trans)}
.fbtn:hover,.fbtn.on{border-color:var(--accent);color:var(--accent);background:var(--glow)}

/* auth modal */
.amask{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
.amask.on{display:flex}
.abox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:320px}
.abox h2{font-family:'ZCOOL XiaoWei',serif;font-size:19px;color:var(--text);margin-bottom:18px;letter-spacing:2px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.field input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:var(--ufont);outline:none;transition:border-color var(--trans)}
.field input:focus{border-color:var(--accent)}
.abtns{display:flex;gap:8px;margin-top:14px}
.abtn{flex:1;padding:9px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:var(--ufont);font-weight:500;transition:all var(--trans)}
.abtn-o{background:none;border:1px solid var(--border);color:var(--text2)}
.abtn-o:hover{border-color:var(--accent);color:var(--accent)}
.abtn-p{background:var(--accent);color:#fff}
.abtn-p:hover{background:var(--accent2)}
.atgl{text-align:center;margin-top:10px;font-size:12px;color:var(--text3)}
.atgl a{color:var(--accent);cursor:pointer}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:50px;font-size:13px;z-index:999;opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.3)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HOME PAGE -->
<div id="homePage" class="page active">
  <nav class="hnav">
    <span class="logo">墨卷</span>
    <div class="sp"></div>
    <button class="ibtn" onclick="openSettings()">⚙</button>
    <button class="ibtn" id="authBtn" onclick="openAuth()">👤</button>
  </nav>
  <div class="hbody">
    <div class="hero">
      <h1>万卷藏书，<em>一键畅读</em></h1>
      <p>搜索全网免费小说 · 在线阅读 · 本地下载</p>
    </div>
    <div class="srow">
      <input class="sinput" id="sinput" placeholder="输入书名或作者名…" autocomplete="off" autocorrect="off" spellcheck="false" type="search" name="novel-search">
      <button class="sbtn" id="sbtn" onclick="doSearch()">搜 索</button>
    </div>
    <p class="shint">内容来源于互联网，仅供个人学习使用</p>
    <div class="rwrap" id="rwrap" style="display:none">
      <div class="rhdr"><span id="rcount"></span><span>来自互联网搜索</span></div>
      <div id="rlist"></div>
    </div>
  </div>
</div>

<!-- READER PAGE -->
<div id="readerPage" class="page">
  <div class="rtopbar">
    <span class="logo" onclick="goHome()">墨卷</span>
    <span class="tbsep">›</span>
    <span class="tbbook" id="tbbook"></span>
    <span class="tbsep">›</span>
    <span class="tbch" id="tbch"></span>
    <div class="tbacts">
      <button class="tbtn" onclick="toggleSidebar()">☰ 目录</button>
      <button class="tbtn" id="bp1" onclick="loadPrev()" disabled>← 上章</button>
      <button class="tbtn" id="bn1" onclick="loadNext()" disabled>下章 →</button>
      <button class="tbtn" onclick="openSettings()">⚙</button>
    </div>
  </div>
  <div class="rprog"><div class="rprogfill" id="rpf"></div></div>
  <div class="rmain">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sbhead">
        <div class="sbttl" id="sbttl">加载中…</div>
        <div class="sbcnt" id="sbcnt"></div>
      </div>
      <div class="sbacts">
        <button class="sabtn" onclick="goHome()">← 返回搜索</button>
        <button class="sabtn" onclick="closeSidebar()">✕ 收起</button>
      </div>
      <div class="clist" id="clist">
        <div style="padding:18px;color:var(--text3);font-size:12px;text-align:center">目录加载中…</div>
      </div>
      <div class="dlsec">
        <button class="dlmain" onclick="startDownload()">⬇ 下载全本 TXT</button>
        <div class="dlpw" id="dlpw">
          <div class="dlbb"><div class="dlbf" id="dlbf"></div></div>
          <div class="dlst" id="dlst"></div>
        </div>
      </div>
    </div>
    <div class="sbmask" id="sbmask" onclick="closeSidebar()"></div>
    <!-- Content -->
    <div class="cwrap" id="cwrap">
      <h2 class="chtitle" id="chtitle">加载中…</h2>
      <div class="chbody" id="chbody"><p style="color:var(--text3)">正在解析目录，请稍候…</p></div>
      <div class="chnav">
        <button class="tbtn" id="bp2" onclick="loadPrev()" disabled>← 上一章</button>
        <button class="tbtn" id="bn2" onclick="loadNext()" disabled>下一章 →</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div class="dmask" id="dmask" onclick="if(event.target===this)closeSettings()">
  <div class="drawer">
    <div class="dhandle"></div>
    <p class="dh3">阅读设置</p>
    <div class="drow">
      <span class="dlabel">主题</span>
      <div class="tdots">
        <div class="tdot dk" onclick="setTheme('')"></div>
        <div class="tdot wm" onclick="setTheme('warm')"></div>
        <div class="tdot gn" onclick="setTheme('green')"></div>
        <div class="tdot gy" onclick="setTheme('gray')"></div>
      </div>
    </div>
    <div class="drow">
      <span class="dlabel">字号</span>
      <div class="fsctl">
        <button class="fsbtn" onclick="setFS(-1)">−</button>
        <span class="fsv" id="fsv">18</span>px
        <button class="fsbtn" onclick="setFS(1)">+</button>
      </div>
    </div>
    <div class="drow">
      <span class="dlabel">行距</span>
      <input class="lhsl" type="range" min="1.6" max="3.2" step="0.2" id="lhsl" oninput="setLH(this.value)">
    </div>
    <div class="drow">
      <span class="dlabel">字体</span>
      <div class="fbtns">
        <button class="fbtn" onclick="setFont('serif')">宋体</button>
        <button class="fbtn" onclick="setFont('sans')">黑体</button>
      </div>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="amask" id="amask">
  <div class="abox">
    <h2 id="atitle">登录账号</h2>
    <div class="field"><label>邮箱</label><input type="email" id="aemail" placeholder="your@email.com"></div>
    <div class="field"><label>密码</label><input type="password" id="apwd" placeholder="至少6位"></div>
    <div class="abtns">
      <button class="abtn abtn-o" onclick="closeAuth()">取消</button>
      <button class="abtn abtn-p" id="asubmit" onclick="submitAuth()">登录</button>
    </div>
    <div class="atgl">还没账号？<a onclick="toggleAM()">注册</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* CONFIG */
const CFG={
  worker:'https://novel-read.sir-way105.workers.dev',
  sbUrl:'https://kuztkvkhubvstbcdoerh.supabase.co',
  sbKey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1enRrdmtodWJ2c3RiY2RvZXJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzg3MzAsImV4cCI6MjA5Mzc1NDczMH0.-JhbCP0SOm-FzP4YeI9Df-ubTTELBfIsviFWlmNt6f4',
}

/* SETTINGS */
let S={theme:'',fs:18,lh:2.0,font:'serif',...JSON.parse(localStorage.getItem('mj_s')||'{}')}
function applyS(){
  document.documentElement.setAttribute('data-theme',S.theme)
  document.documentElement.style.setProperty('--fs',S.fs+'px')
  document.documentElement.style.setProperty('--lh',S.lh)
  document.documentElement.style.setProperty('--rfont',S.font==='sans'?"'Noto Sans SC',sans-serif":"'Noto Serif SC',serif")
  const fv=document.getElementById('fsv');if(fv)fv.textContent=S.fs
  const ls=document.getElementById('lhsl');if(ls)ls.value=S.lh
}
function saveS(){localStorage.setItem('mj_s',JSON.stringify(S));applyS()}
function setTheme(t){S.theme=t;saveS()}
function setFS(d){S.fs=Math.max(14,Math.min(28,S.fs+d));saveS()}
function setLH(v){S.lh=parseFloat(v);saveS()}
function setFont(f){S.font=f;saveS()}
function openSettings(){document.getElementById('dmask').classList.add('on')}
function closeSettings(){document.getElementById('dmask').classList.remove('on')}

/* SUPABASE */
let _sb=null,_user=null
try{
  _sb=supabase.createClient(CFG.sbUrl,CFG.sbKey)

/* AUTH */
let _am='login'
function openAuth(){document.getElementById('amask').classList.add('on')}
function closeAuth(){document.getElementById('amask').classList.remove('on')}
function toggleAM(){
  _am=_am==='login'?'register':'login'
  document.getElementById('atitle').textContent=_am==='login'?'登录账号':'注册账号'
  document.getElementById('asubmit').textContent=_am==='login'?'登录':'注册'
  document.querySelector('.atgl').innerHTML=_am==='login'?'还没账号？<a onclick="toggleAM()">注册</a>':'已有账号？<a onclick="toggleAM()">登录</a>'
}
async function submitAuth(){
  if(!_sb){toast('请先配置Supabase');return}
  const em=document.getElementById('aemail').value,pw=document.getElementById('apwd').value
  if(!em||!pw){toast('请填写邮箱和密码');return}
  try{
    const{error}=await(_am==='login'?_sb.auth.signInWithPassword({email:em,password:pw}):_sb.auth.signUp({email:em,password:pw}))
    if(error)throw error
    closeAuth();toast(_am==='login'?'登录成功':'注册成功，请查收验证邮件')
    _user=(await _sb.auth.getUser()).data.user
    if(_user)document.getElementById('authBtn').textContent='🟢'
  }catch(e){toast(e.message||'操作失败')}
}

/* API */
async function api(a,p){
  const u=new URL(CFG.worker);u.searchParams.set('a',a);u.searchParams.set('p',p)
  const r=await fetch(u.toString())
  if(!r.ok)throw new Error('HTTP '+r.status)
  const d=await r.json()
  if(d.error)throw new Error(d.error)
  return d
}

/* PAGE NAV */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  window.scrollTo(0,0)
}
function goHome(){showPage('homePage')}

/* SEARCH */
let _busy=false
async function doSearch(){
  if(_busy){toast('搜索中…');return}
  const q=document.getElementById('sinput').value.trim()
  if(!q){toast('请输入书名');return}
  _busy=true
  const btn=document.getElementById('sbtn');btn.textContent='搜索中…';btn.disabled=true
  document.getElementById('rwrap').style.display='block'
  document.getElementById('rlist').innerHTML='<div class="ltxt">搜索中，请稍候…</div>'
  document.getElementById('rcount').textContent=''
  try{
    const data=await api('search',q)
    const items=data.results||[]
    document.getElementById('rcount').textContent='共'+items.length+'条'
    if(!items.length){document.getElementById('rlist').innerHTML='<div class="empty"><div class="ei">🔍</div><p>未找到结果</p></div>';return}
    document.getElementById('rlist').innerHTML=items.map(r=>{
      const su=encodeURIComponent(r.url),st=encodeURIComponent(r.title)
      const host=new URL(r.url).hostname
      const ini=r.title.replace(/[《》\s]/g,'').slice(0,3)
      return`<div class="rcard" onclick="enterReader('${su}','${st}')">
        <div class="rthumb">${ini}</div>
        <div class="rinfo"><div class="rtitle">${esc(r.title)}</div><div class="rmeta">🔗 ${host}</div></div>
        <span class="rarrow">›</span></div>`
    }).join('')
  }catch(e){
    document.getElementById('rlist').innerHTML=`<div class="empty"><div class="ei">⚠️</div><p>搜索失败：${esc(e.message)}</p></div>`
  }finally{_busy=false;btn.textContent='搜 索';btn.disabled=false}
}

/* READER STATE */
let _burl='',_btitle='',_chs=[],_idx=0,_loaded=false,_pu=null,_nu=null

/* ENTER READER */
async function enterReader(su,st){
  _burl=decodeURIComponent(su);_btitle=decodeURIComponent(st)
  _chs=[];_idx=0;_loaded=false;_pu=null;_nu=null;_dbBookId=null
  showPage('readerPage')
  document.getElementById('tbbook').textContent=_btitle
  document.getElementById('tbch').textContent='加载中…'
  document.getElementById('sbttl').textContent=_btitle
  document.getElementById('sbcnt').textContent=''
  document.getElementById('chtitle').textContent='加载中…'
  document.getElementById('chbody').innerHTML='<p style="color:var(--text3)">正在加载…</p>'
  document.getElementById('clist').innerHTML='<div style="padding:18px;color:var(--text3);font-size:12px;text-align:center">加载中…</div>'
  setNav(false,false)
  addHist(_burl,_btitle,0)
  // 先查数据库，有则秒开；无则实时抓取
  const dbBook = await findInDB(_btitle)
  if(dbBook){
    _dbBookId=dbBook.id
    await loadFromDB(dbBook)
  }else{
    // 数据库没有 → 并行：搜第一章 + 后台加载目录
    document.getElementById('chbody').innerHTML='<p style="color:var(--text3)">数据库中暂无此书，正在实时搜索（约5-15秒）…</p>'
    Promise.all([loadFirstChapter(), fetchBook()])
  }
}

// 查 D1 数据库（通过 Worker）
async function findInDB(title){
  try{
    const kw=title.replace(/[《》\s]/g,'').slice(0,15)
    const d=await api('db_search',kw)
    return d.books&&d.books.length?d.books[0]:null
  }catch(e){return null}
}

// 从 D1 加载书籍（秒开）
async function loadFromDB(book){
  _btitle=book.title;_dbBookId=book.id
  document.getElementById('tbbook').textContent=book.title
  document.getElementById('sbttl').textContent=book.title
  document.getElementById('sbcnt').textContent='加载目录中…'
  try{
    const u=new URL(CFG.worker)
    u.searchParams.set('a','db_chapters')
    u.searchParams.set('p',book.id)
    const r=await fetch(u.toString())
    const d=await r.json()
    if(!d.chapters||!d.chapters.length){
      document.getElementById('chbody').innerHTML='<p style="color:var(--text3)">数据库中暂无章节，请先运行 scraper_d1.py 下载。</p>'
      document.getElementById('sbcnt').textContent='0章'
      return
    }
    _chs=d.chapters.map(c=>({...c,url:null}))
    _loaded=true
    document.getElementById('sbcnt').textContent=_chs.length+'章（数据库）'
    renderClist()
    const h=getHist().find(x=>x.url===_burl)
    const si=Math.min(h?.idx||0,_chs.length-1)
    loadDBChapter(si)
  }catch(e){
    document.getElementById('chbody').innerHTML=`<p style="color:var(--text3)">数据库读取失败：${esc(e.message)}</p>`
  }
}

// 从 D1 读章节正文（毫秒级）
async function loadDBChapter(idx){
  if(!_dbBookId)return
  _idx=idx
  const ch=_chs[idx]
  if(!ch)return
  document.getElementById('chtitle').textContent=ch.title
  document.getElementById('tbch').textContent=ch.title
  document.getElementById('chbody').innerHTML='<p style="color:var(--text3)">加载中…</p>'
  document.getElementById('rpf').style.width='0'
  document.getElementById('cwrap').scrollTop=0
  hlCh(idx)
  try{
    const u=new URL(CFG.worker)
    u.searchParams.set('a','db_chapter')
    u.searchParams.set('p',_dbBookId)
    u.searchParams.set('idx',idx)
    const r=await fetch(u.toString())
    const d=await r.json()
    if(d.error)throw new Error(d.error)
    document.getElementById('chtitle').textContent=d.title
    document.getElementById('tbch').textContent=d.title
    const ps=d.content.split('\n').filter(p=>p.trim())
    document.getElementById('chbody').innerHTML=ps.length
      ?ps.map(p=>`<p>${esc(p.trim())}</p>`).join('')
      :'<p style="color:var(--text3)">内容为空</p>'
    setNav(idx>0,idx<_chs.length-1)
    addHist(_burl,_btitle,idx)
    setupProg()
  }catch(e){
    document.getElementById('chbody').innerHTML=`<p style="color:var(--text3)">加载失败：${esc(e.message)}</p>`
  }
}

async function loadFirstChapter(){
  try{
    const u=new URL(CFG.worker)
    u.searchParams.set('a','chapter1')
    u.searchParams.set('p',_burl)
    u.searchParams.set('title',encodeURIComponent(_btitle))
    const r=await fetch(u.toString())
    if(!r.ok)throw new Error('HTTP '+r.status)
    const d=await r.json()
    if(d.error)throw new Error(d.error)
    // 渲染正文
    renderChapterContent(d)
  }catch(e){
    // chapter1 失败 → 再等目录加载完（fetchBook会自动加载第一章）
    document.getElementById('chbody').innerHTML=`<p style="color:var(--text3);margin-bottom:12px">自动搜索失败，正在等待目录加载…</p><a href="${_burl}" target="_blank" style="color:var(--accent)">或在原网站阅读 ↗</a>`
  }
}

function renderChapterContent(d){
  const title=d.title||'未知章节'
  document.getElementById('chtitle').textContent=title
  document.getElementById('tbch').textContent=title
  const ps=(d.content||'').split('\n').filter(p=>p.trim())
  document.getElementById('chbody').innerHTML=ps.length
    ?ps.map(p=>`<p>${esc(p.trim())}</p>`).join('')
    :`<p style="color:var(--text3)">内容为空。</p><p><a href="${d.url||_burl}" target="_blank" style="color:var(--accent)">原网站阅读 ↗</a></p>`
  _pu=d.prevUrl;_nu=d.nextUrl
  const hp=_pu||(_chs.length>0&&_idx>0)
  const hn=_pu||_nu||(_chs.length>1)
  setNav(hp,hn)
  setupProg()
  if(d.url) _curChUrl=d.url
}

async function fetchBook(){
  const t=setTimeout(()=>{
    if(!_loaded){
      const clist=document.getElementById('clist')
      if(clist.innerHTML.includes('加载中'))
        clist.innerHTML=`<div style="padding:18px;text-align:center"><p style="color:var(--text3);font-size:12px;margin-bottom:10px">目录解析失败</p><a href="${_burl}" target="_blank" style="color:var(--accent);font-size:12px">原网站 ↗</a></div>`
    }
  },18000)
  try{
    const d=await api('book',_burl)
    _btitle=d.title||_btitle
    _chs=d.chapters||[]
    _loaded=true
    document.getElementById('sbttl').textContent=_btitle
    document.getElementById('tbbook').textContent=_btitle
    document.getElementById('sbcnt').textContent=_chs.length+'章'
    renderClist()
    if(_chs.length>0){
      const h=getHist().find(x=>x.url===_burl)
      // 只有在正文还没加载出来时，才自动加载第一章
      const bodyEl=document.getElementById('chbody')
      const bodyEmpty=bodyEl.textContent.includes('解析')||bodyEl.textContent.includes('搜索')||bodyEl.textContent.includes('失败')||bodyEl.children.length===0
      if(bodyEmpty){
        fetchChapter(_chs[h?.idx||0]?.url||_chs[0].url, _chs[h?.idx||0]?.title||_chs[0].title, h?.idx||0)
      }
      // 更新导航按钮
      const hn=_chs.length>1
      setNav(_pu||false, _nu||hn)
    }else{
      document.getElementById('chtitle').textContent=_btitle
      document.getElementById('chbody').innerHTML=`<p style="color:var(--text3);margin-bottom:14px">暂无法解析该网站目录。</p><a href="${_burl}" target="_blank" style="color:var(--accent)">在原网站阅读 ↗</a>`
      document.getElementById('clist').innerHTML=`<div style="padding:18px;text-align:center"><p style="color:var(--text3);font-size:12px;margin-bottom:10px">目录解析失败</p><a href="${_burl}" target="_blank" style="color:var(--accent);font-size:12px">原网站 ↗</a></div>`
    }
    clearTimeout(t)
  }catch(e){
    clearTimeout(t)
    document.getElementById('chtitle').textContent='加载失败'
    document.getElementById('chbody').innerHTML=`<p style="color:var(--text3);margin-bottom:14px">目录解析失败。</p><a href="${_burl}" target="_blank" style="color:var(--accent)">在原网站阅读 ↗</a>`
    document.getElementById('clist').innerHTML=`<div style="padding:18px;text-align:center"><a href="${_burl}" target="_blank" style="color:var(--accent);font-size:12px">原网站阅读 ↗</a></div>`
  }
}

/* CHAPTER LIST */
let _slim=100
function renderClist(){
  const show=_chs.slice(0,_slim)
  const html=show.map((c,i)=>`<div class="citem${i===_idx?' on':''}" id="ci${i}" onclick="fetchChapter('${encodeURIComponent(c.url)}','${esc(c.title)}',${i})">${esc(c.title)}</div>`).join('')
  const more=_chs.length>_slim?`<div class="cmore" onclick="loadMore()">显示更多（${_chs.length-_slim}章）</div>`:''
  document.getElementById('clist').innerHTML=html+more
}
function loadMore(){_slim+=200;renderClist()}

let _dbBookId=null

/* FETCH CHAPTER - 自动判断走DB还是实时 */
async function fetchChapter(su,htitle,idx){
  // 如果是DB模式
  if(_dbBookId&&(!su||su==='null')){
    loadDBChapter(idx!==undefined?idx:_idx)
    return
  }
  const url=typeof su==='string'&&su.startsWith('http')?su:(su?decodeURIComponent(su):null)
  if(!url){loadDBChapter(idx!==undefined?idx:_idx);return}
  if(idx!==undefined)_idx=idx
  document.getElementById('chtitle').textContent=htitle||'加载中…'
  document.getElementById('tbch').textContent=htitle||'加载中…'
  document.getElementById('chbody').innerHTML='<p style="color:var(--text3)">加载正文中…</p>'
  document.getElementById('rpf').style.width='0'
  _pu=null;_nu=null;setNav(false,false)
  document.getElementById('cwrap').scrollTop=0
  if(idx!==undefined)hlCh(idx)
  try{
    const d=await api('chapter',url)
    const title=d.title||htitle||'未知章节'
    document.getElementById('chtitle').textContent=title
    document.getElementById('tbch').textContent=title
    const ps=(d.content||'').split('\n').filter(p=>p.trim())
    document.getElementById('chbody').innerHTML=ps.length
      ?ps.map(p=>`<p>${esc(p.trim())}</p>`).join('')
      :`<p style="color:var(--text3)">内容为空。</p><p><a href="${url}" target="_blank" style="color:var(--accent)">原网站阅读 ↗</a></p>`
    _pu=d.prevUrl;_nu=d.nextUrl
    const hp=_pu||(idx!==undefined&&idx>0)
    const hn=_nu||(idx!==undefined&&idx<_chs.length-1)
    setNav(hp,hn)
    addHist(_burl,_btitle,idx||0)
    setupProg()
  }catch(e){
    document.getElementById('chtitle').textContent=htitle||'加载失败'
    document.getElementById('chbody').innerHTML=`<p style="color:var(--text3);margin-bottom:12px">章节加载失败：${esc(e.message)}</p><a href="${url}" target="_blank" style="color:var(--accent)">在原网站阅读 ↗</a>`
  }
}

function hlCh(idx){
  document.querySelectorAll('.citem').forEach(e=>e.classList.remove('on'))
  const el=document.getElementById('ci'+idx)
  if(el){el.classList.add('on');el.scrollIntoView({block:'nearest',behavior:'smooth'})}
}
function setNav(p,n){
  ['bp1','bp2'].forEach(id=>{const e=document.getElementById(id);if(e)e.disabled=!p})
  ['bn1','bn2'].forEach(id=>{const e=document.getElementById(id);if(e)e.disabled=!n})
}
function loadPrev(){
  if(_dbBookId){if(_idx>0)loadDBChapter(_idx-1);return}
  if(_idx>0){const c=_chs[_idx-1];fetchChapter(c.url,c.title,_idx-1);return}
  if(_pu)fetchChapter(_pu,'上一章')
}
function loadNext(){
  if(_dbBookId){if(_idx<_chs.length-1)loadDBChapter(_idx+1);return}
  if(_idx<_chs.length-1){const c=_chs[_idx+1];fetchChapter(c.url,c.title,_idx+1);return}
  if(_nu)fetchChapter(_nu,'下一章')
}

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(!document.getElementById('readerPage').classList.contains('active'))return
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return
  if(e.key==='ArrowLeft')loadPrev()
  if(e.key==='ArrowRight')loadNext()
})

/* SCROLL PROGRESS */
function setupProg(){
  const fill=document.getElementById('rpf'),wrap=document.getElementById('cwrap')
  wrap.removeEventListener('scroll',wrap._ph)
  wrap._ph=()=>{
    const t=wrap.scrollHeight-wrap.clientHeight
    fill.style.width=(t>0?Math.round(wrap.scrollTop/t*100):0)+'%'
  }
  wrap.addEventListener('scroll',wrap._ph,{passive:true})
}

/* SIDEBAR */
let _sbOpen=true
function toggleSidebar(){
  if(window.innerWidth<=720){
    document.getElementById('sidebar').classList.toggle('mob-open')
    document.getElementById('sbmask').classList.toggle('on')
  }else{
    _sbOpen=!_sbOpen
    document.getElementById('sidebar').classList.toggle('hidden',!_sbOpen)
  }
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open')
  document.getElementById('sbmask').classList.remove('on')
}

/* DOWNLOAD */
let _dl=false
async function startDownload(){
  if(!_loaded||!_chs.length){toast('目录尚未加载，请稍候');return}
  if(_dl){toast('下载中，请稍候');return}
  _dl=true
  const pw=document.getElementById('dlpw'),bf=document.getElementById('dlbf'),st=document.getElementById('dlst')
  pw.style.display='block';bf.style.width='0'
  let txt=`《${_btitle}》\n${'═'.repeat(40)}\n\n`
  let fail=0
  for(let i=0;i<_chs.length;i++){
    st.textContent=`${i+1}/${_chs.length} ${_chs[i].title}`
    bf.style.width=(i/_chs.length*100)+'%'
    try{
      const d=await api('chapter',_chs[i].url)
      txt+=`\n\n${d.title||_chs[i].title}\n${'─'.repeat(30)}\n\n${d.content}\n`
    }catch(e){txt+=`\n\n${_chs[i].title}\n${'─'.repeat(30)}\n\n（加载失败）\n`;fail++}
    await new Promise(r=>setTimeout(r,700))
  }
  bf.style.width='100%';st.textContent=`完成！${_chs.length}章${fail?` (${fail}失败)`:''}`
  _dl=false
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'})
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${_btitle}.txt`;a.click();URL.revokeObjectURL(a.href)
}

/* HISTORY */
function getHist(){return JSON.parse(localStorage.getItem('mj_h')||'[]')}
function addHist(url,title,idx){
  let h=getHist().filter(x=>x.url!==url)
  h.unshift({url,title,idx:idx||0,time:new Date().toLocaleDateString()})
  if(h.length>50)h=h.slice(0,50)
  localStorage.setItem('mj_h',JSON.stringify(h))
}

/* UTILS */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let _tt;function toast(m,ms=2200){const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('on'),ms)}

/* INIT */
applyS()
document.getElementById('sinput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch()}})
